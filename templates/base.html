<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Seatwise - Exam Allocator{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff; /* Explicit white background as requested */
        }
    </style>
</head>
<body class="bg-white text-slate-800 antialiased min-h-screen flex flex-col">
    <!-- Header/Navbar -->
    <header class="border-b border-slate-100 bg-white sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-8">
                <!-- Logo -->
                <a href="/" class="flex items-center space-x-2">
                    <span class="bg-indigo-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold text-lg shadow-sm">S</span>
                    <span class="font-semibold text-slate-900 text-lg">Seatwise</span>
                    <span class="text-xs text-slate-400 font-normal border-l border-slate-200 pl-2">exam allocator</span>
                </a>
                
                <!-- Nav items -->
                <nav class="hidden md:flex items-center space-x-1">
                    <a href="/" class="px-3 py-1.5 rounded-lg text-sm font-medium {% if request.path == '/' %}bg-slate-50 text-slate-900{% else %}text-slate-500 hover:text-slate-900 hover:bg-slate-50{% endif %} transition-colors">
                        Dashboard
                    </a>
                    <a href="/new" class="px-3 py-1.5 rounded-lg text-sm font-medium {% if request.path == '/new' %}bg-slate-50 text-slate-900{% else %}text-slate-500 hover:text-slate-900 hover:bg-slate-50{% endif %} transition-colors">
                        New Allocation
                    </a>
                    <a href="/seat-map" class="px-3 py-1.5 rounded-lg text-sm font-medium {% if request.path == '/seat-map' %}bg-slate-50 text-slate-900{% else %}text-slate-500 hover:text-slate-900 hover:bg-slate-50{% endif %} transition-colors">
                        Seat Map
                    </a>
                </nav>
            </div>

            <!-- Right stats / user profile -->
            <div class="flex items-center space-x-4">
                <span class="text-xs text-slate-400 font-medium hidden sm:inline">Exam Cell - Autumn 2026</span>
                <div class="w-8 h-8 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-xs font-semibold text-slate-600 cursor-pointer hover:bg-slate-200 transition-colors">
                    RM
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-100 bg-white py-6 mt-12 text-center text-xs text-slate-400">
        <p>&copy; 2026 Seatwise Exam Allocator. All rights reserved. Powered by Ponytail.</p>
    </footer>
</body>
</html>
